services:
  mysql:
    image: mysql:8.4
    container_name: br-search-name-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: br_search_name
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: br-search-name-api
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: mysql://root:password@mysql:3306/br_search_name
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      JWT_SECRET: change-this-secret
      JWT_EXPIRES_IN: 1d
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
